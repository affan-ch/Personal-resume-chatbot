name: Deploy Flask App to Ubuntu VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # 1. Setup server
      - name: Setup server
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'EOF'

          sudo apt update
          sudo apt install -y python3 python3-pip python3-venv nginx

          sudo mkdir -p /var/www/flaskapp
          sudo chown -R $USER:$USER /var/www/flaskapp

          EOF

      # 2. Upload files
      - name: Upload project files
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" scp -o StrictHostKeyChecking=no app.py ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/var/www/flaskapp/
          sshpass -p "${{ secrets.VPS_PASSWORD }}" scp -o StrictHostKeyChecking=no requirements.txt ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/var/www/flaskapp/
          sshpass -p "${{ secrets.VPS_PASSWORD }}" scp -o StrictHostKeyChecking=no index.html ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/var/www/flaskapp/

      # 3. Install dependencies
      - name: Install Python dependencies
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'EOF'

          cd /var/www/flaskapp

          python3 -m venv venv
          source venv/bin/activate

          pip install --upgrade pip
          pip install -r requirements.txt

          EOF

      # 4. Gunicorn service
      - name: Configure Gunicorn service
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'EOF'

          sudo bash -c 'cat > /etc/systemd/system/flaskapp.service << EOL
          [Unit]
          Description=Flask Backend
          After=network.target

          [Service]
          User=root
          WorkingDirectory=/var/www/flaskapp
          ExecStart=/var/www/flaskapp/venv/bin/gunicorn -w 2 -b 127.0.0.1:5000 app:app
          Restart=always

          [Install]
          WantedBy=multi-user.target
          EOL'

          sudo systemctl daemon-reload
          sudo systemctl enable flaskapp
          sudo systemctl restart flaskapp

          EOF

      # 5. Nginx config (FIXED)
      - name: Setup Nginx
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'EOF'

          sudo bash -c 'cat > /etc/nginx/sites-available/flaskapp << EOL
          server {
              listen 80;
              server_name chatbot.codebyte.site;

              root /var/www/flaskapp;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://127.0.0.1:5000/;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }
          EOL'

          sudo ln -sf /etc/nginx/sites-available/flaskapp /etc/nginx/sites-enabled/flaskapp

          sudo nginx -t
          sudo systemctl restart nginx

          EOF
