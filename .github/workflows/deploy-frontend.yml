name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Prepare VPS (create directory)
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'EOF'
          
          sudo mkdir -p /var/www/html
          sudo chown -R $USER:$USER /var/www/html
      
          EOF

      - name: Copy files to VPS
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" scp -o StrictHostKeyChecking=no -r ./* ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/var/www/html/
          
      - name: Setup Nginx and restart
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'EOF'
          
          sudo apt update
          sudo apt install -y nginx

          # Create site config
          sudo bash -c 'cat > /etc/nginx/sites-available/chatbot.codebyte.site << EOL
          server {
              listen 80;
              server_name chatbot.codebyte.site;

              root /var/www/html;
              index index.html;

              location / {
                  try_files \$uri \$uri/ =404;
              }
          }
          EOL'

          # Enable site
          sudo ln -sf /etc/nginx/sites-available/chatbot.codebyte.site /etc/nginx/sites-enabled/

          # Test and restart nginx
          sudo nginx -t
          sudo systemctl restart nginx

          EOF
